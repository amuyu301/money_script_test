<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>マネースクリプト・テスト</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --good: #059669;
      --warn: #d97706;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 18px 14px 44px;
    }

    .hero, .card, .result-card, .sticky-bar {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.9);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .hero {
      padding: 22px 18px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 1.6rem;
      line-height: 1.3;
      margin: 0 0 8px;
    }

    h2 {
      font-size: 1.15rem;
      margin: 0 0 10px;
    }

    p { margin: 0 0 10px; }

    .muted { color: var(--muted); }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .legend-item {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 0.92rem;
    }

    .progress-wrap {
      margin: 14px 0 8px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #60a5fa 0%, var(--primary) 100%);
      transition: width 0.25s ease;
    }

    .question-list {
      display: grid;
      gap: 12px;
    }

    .card {
      padding: 16px 14px;
    }

    .q-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .q-no {
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .q-text {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .choice input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .choice label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      transition: 0.18s ease;
      user-select: none;
    }

    .choice strong {
      font-size: 1.05rem;
      line-height: 1;
    }

    .choice span {
      font-size: 0.74rem;
      color: var(--muted);
      line-height: 1.25;
    }

    .choice input:checked + label {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.14);
    }

    .choice input:checked + label span {
      color: var(--primary);
    }

    .sticky-bar {
      position: sticky;
      bottom: 10px;
      padding: 12px;
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
    }

    .sticky-status {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }

    button.secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    button.ghost {
      background: #f3f4f6;
      color: #374151;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .result-section {
      margin-top: 16px;
      display: none;
      gap: 12px;
    }

    .result-section.show {
      display: grid;
    }

    .result-card {
      padding: 16px 14px;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 10px;
      border: 1px solid transparent;
    }

    .level-low { background: #ecfdf5; color: var(--good); border-color: #a7f3d0; }
    .level-mid { background: #fffbeb; color: var(--warn); border-color: #fde68a; }
    .level-high { background: #fff7ed; color: #c2410c; border-color: #fdba74; }
    .level-very-high { background: #fef2f2; color: var(--danger); border-color: #fca5a5; }

    .score-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .score-line .num {
      font-size: 1.45rem;
      font-weight: 800;
    }

    .mini-note {
      font-size: 0.86rem;
      color: var(--muted);
    }

    .warning {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 0.92rem;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .container { padding: 12px 10px 34px; }
      .hero, .card, .result-card { border-radius: 16px; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .legend { grid-template-columns: 1fr; }
      .sticky-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .actions { justify-content: stretch; }
      .actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>マネースクリプト・テスト</h1>
      <p>32問の質問に、<strong>1〜6点</strong>で答える自己診断テストです。すべて回答すると、4つの傾向を自動で集計して表示します。</p>
      <p class="muted">点数の意味：1＝完全に反対、2＝反対、3＝少し反対、4＝少し賛成、5＝賛成、6＝完全に賛成</p>

      <div class="legend">
        <div class="legend-item"><strong>金銭忌避</strong><br>お金に対する罪悪感や拒否感の傾向</div>
        <div class="legend-item"><strong>金銭崇拝</strong><br>お金が幸せや解決をもたらすと考える傾向</div>
        <div class="legend-item"><strong>金銭地位</strong><br>お金を成功や価値の指標として見る傾向</div>
        <div class="legend-item"><strong>金銭警戒</strong><br>支出に慎重で、貯蓄や不安が強くなりやすい傾向</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span id="progressText">回答数：0 / 32</span>
          <span id="percentText">0%</span>
        </div>
        <div class="progress" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </section>

    <section class="question-list" id="questionList"></section>

    <section class="result-section" id="resultSection" aria-live="polite"></section>

    <div class="sticky-bar">
      <div class="sticky-status" id="stickyStatus">すべての質問に答えると採点できます。</div>
      <div class="actions">
        <button class="ghost" id="resetBtn" type="button">回答をリセット</button>
        <button class="secondary" id="saveBtn" type="button">途中保存</button>
        <button class="primary" id="scoreBtn" type="button">採点する</button>
      </div>
    </div>
  </main>

  <script>
    const questions = [
      '他の人が自分よりも貧しいときは、私はより多くのお金を持つわけにはいかない',
      '金持ちは欲深い',
      '人は他人を利用して金持ちになるものだ',
      '私はお金を稼ぐに値しない人間だ',
      '善良な人はお金のことを気にしてはいけない',
      'お金持ちになると同時に善人でいるのは難しい',
      'お金が少ないほど、人生は良いものになる',
      'お金は人を堕落させる',
      '金持ちになるということは、昔からの友人や家族と疎遠になるということだ',
      'もっとお金があれば、物事は良くなるだろう',
      'お金が多ければ幸せになれる',
      '貧しいまま幸せになるのは難しい',
      'お金はいくらあっても足りない',
      'お金は力だ',
      'お金は私の問題をすべて解決してくれる',
      'お金は自由を買うことができる',
      'ほとんどの貧乏人はお金を持つ資格がない',
      '愛とお金を同時に得ることはできない',
      '何かを買うときは新品しか買わない（車や家など）',
      '貧しい人は怠け者だ',
      'お金は人生に意味を与えるものだ',
      '私の自己価値は、私の純資産に等しい',
      '「最高」と判断できないものは、買う価値がない',
      '人間の成功は、稼いだお金の量で決まる',
      '自分がどれだけのお金を持っているか、どれだけ稼いでいるかを他人に教えてはいけない',
      '他人にどれだけお金を持っているか、あるいはどれぐらい稼いでいるかを尋ねるのは間違っている',
      'お金は使うのではなく、貯めるべきだ',
      '将来トラブルが起きたときのために貯金をすることは重要だ',
      '人間はお金のために働くべきであり、他人から経済的に保護されるべきではない',
      'もしもの時のためにお金が貯まっていなかったら、神経質になってしまう',
      'たとえ時間がかかっても、何かを買う前には常に最良のものを探すべきだ',
      '自分のためにお金を使うのは贅沢だ'
    ];

    const labels = {
      1: '完全に反対',
      2: '反対',
      3: '少し反対',
      4: '少し賛成',
      5: '賛成',
      6: '完全に賛成'
    };

    const questionList = document.getElementById('questionList');
    const progressText = document.getElementById('progressText');
    const percentText = document.getElementById('percentText');
    const progressBar = document.getElementById('progressBar');
    const resultSection = document.getElementById('resultSection');
    const stickyStatus = document.getElementById('stickyStatus');

    function renderQuestions() {
      questionList.innerHTML = questions.map((q, i) => {
        const idx = i + 1;
        return `
          <article class="card">
            <div class="q-head">
              <div class="q-no">${idx}</div>
              <div class="q-text">${q}</div>
            </div>
            <div class="choices" role="radiogroup" aria-label="質問${idx}">
              ${[1,2,3,4,5,6].map(value => `
                <div class="choice">
                  <input type="radio" name="q${idx}" id="q${idx}_${value}" value="${value}">
                  <label for="q${idx}_${value}">
                    <strong>${value}</strong>
                    <span>${labels[value]}</span>
                  </label>
                </div>
              `).join('')}
            </div>
          </article>
        `;
      }).join('');
    }

    function getAnswers() {
      return questions.map((_, i) => {
        const checked = document.querySelector(`input[name="q${i+1}"]:checked`);
        return checked ? Number(checked.value) : null;
      });
    }

    function answeredCount() {
      return getAnswers().filter(v => v !== null).length;
    }

    function updateProgress() {
      const count = answeredCount();
      const percent = Math.round((count / questions.length) * 100);
      progressText.textContent = `回答数：${count} / ${questions.length}`;
      percentText.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;
      stickyStatus.textContent = count === questions.length
        ? '回答がそろいました。採点できます。'
        : `未回答：${questions.length - count}問`;
    }

    function sumRange(answers, start, end) {
      return answers.slice(start - 1, end).reduce((sum, v) => sum + v, 0);
    }

    function judgeAvoidance(score) {
      if (score >= 9 && score <= 18) return ['傾向はない', 'お金に対する強い拒否感は見られません。', 'level-low'];
      if (score >= 19 && score <= 27) return ['傾向がややあり', 'お金の問題について話し合うのを避けやすい状態です。', 'level-mid'];
      if (score >= 28 && score <= 36) return ['傾向が高い', '個人的な支出計画や予算を守るのに苦労しがちです。', 'level-high'];
      return ['傾向がとても高い', '過剰な出費や強迫的な買い物につながることがあります。', 'level-very-high'];
    }

    function judgeWorship(score) {
      if (score >= 7 && score <= 14) return ['傾向はない', 'お金を過度に理想化する傾向は強くありません。', 'level-low'];
      if (score >= 15 && score <= 30) return ['傾向がややあり', '衝動的な支出が多くなりやすい状態です。', 'level-mid'];
      if (score >= 31 && score <= 38) return ['傾向が高い', '強迫的な支出や、仕事と生活の不均衡が起きやすい状態です。', 'level-high'];
      return ['傾向がとても高い', '金銭的依存や、自分の金銭状況を無視した支出につながることがあります。', 'level-very-high'];
    }

    function judgeStatus(score) {
      if (score >= 8 && score <= 16) return ['傾向はない', 'お金を自己価値や社会的評価と強く結びつける傾向は目立ちません。', 'level-low'];
      if (score >= 17 && score <= 24) return ['傾向がややあり', '強迫的な支出が増えやすい状態です。', 'level-mid'];
      if (score >= 25 && score <= 32) return ['傾向が高い', '他人からの借金を重ねやすい傾向があります。', 'level-high'];
      return ['傾向がとても高い', '秘密の支出が増え、金銭のために不正へ傾く危険もあります。', 'level-very-high'];
    }

    function judgeVigilance(score) {
      if (score >= 8 && score <= 16) return ['傾向はない', 'お金への過度な警戒は強くありません。', 'level-low'];
      if (score >= 17 && score <= 24) return ['傾向がややあり', '貯蓄の傾向が大きくなりやすい状態です。', 'level-mid'];
      if (score >= 25 && score <= 32) return ['傾向が高い', '本来は必要な出費も抑えがちです。', 'level-high'];
      return ['傾向がとても高い', '貯蓄意識が強すぎて、人生の楽しみに支障が出ることがあります。', 'level-very-high'];
    }

    function resultCard(title, score, range, judgment) {
      const [level, desc, cls] = judgment;
      return `
        <section class="result-card">
          <div class="score-badge ${cls}">${title}：${level}</div>
          <div class="score-line">
            <h2>${title}</h2>
            <div class="num">${score}点</div>
          </div>
          <p>${desc}</p>
          <p class="mini-note">判定範囲：${range}</p>
        </section>
      `;
    }

    function scoreTest() {
      const answers = getAnswers();
      const missingIndex = answers.findIndex(v => v === null);
      if (missingIndex !== -1) {
        document.getElementById(`q${missingIndex + 1}_1`).closest('.card').scrollIntoView({ behavior: 'smooth', block: 'center' });
        alert(`未回答の質問があります。質問${missingIndex + 1}に回答してください。`);
        return;
      }

      const avoidance = sumRange(answers, 1, 9);
      const worship = sumRange(answers, 10, 16);
      const status = sumRange(answers, 17, 24);
      const vigilance = sumRange(answers, 25, 32);

      resultSection.innerHTML = `
        ${resultCard('金銭忌避', avoidance, '9〜18 / 19〜27 / 28〜36 / 37〜54', judgeAvoidance(avoidance))}
        ${resultCard('金銭崇拝', worship, '7〜14 / 15〜30 / 31〜38 / 39〜49', judgeWorship(worship))}
        ${resultCard('金銭地位', status, '8〜16 / 17〜24 / 25〜32 / 33〜48', judgeStatus(status))}
        ${resultCard('金銭警戒', vigilance, '8〜16 / 17〜24 / 25〜32 / 33〜48', judgeVigilance(vigilance))}
        <section class="result-card">
          <h2>見方</h2>
          <p>このテストは、金銭に対する考え方の偏りを見つけるための自己診断です。病気や障害を診断するものではありません。</p>
          <div class="warning">結果が高かった項目は、家計管理・買い物・将来不安・自己評価の考え方を見直すヒントとして使ってください。</div>
          <p class="footer-note">必要なら、各傾向に対する改善アドバイス欄を追加できます。</p>
        </section>
      `;
      resultSection.classList.add('show');
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      saveAnswers();
    }

    function saveAnswers() {
      const answers = getAnswers();
      localStorage.setItem('moneyScriptAnswers', JSON.stringify(answers));
      localStorage.setItem('moneyScriptSavedAt', new Date().toISOString());
      alert('回答を保存しました。');
    }

    function loadAnswers() {
      const raw = localStorage.getItem('moneyScriptAnswers');
      if (!raw) return;
      try {
        const answers = JSON.parse(raw);
        answers.forEach((value, i) => {
          if (value) {
            const input = document.getElementById(`q${i + 1}_${value}`);
            if (input) input.checked = true;
          }
        });
      } catch (e) {
        console.error(e);
      }
    }

    function resetAnswers() {
      document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.checked = false;
      });
      localStorage.removeItem('moneyScriptAnswers');
      localStorage.removeItem('moneyScriptSavedAt');
      resultSection.innerHTML = '';
      resultSection.classList.remove('show');
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuestions();
    loadAnswers();
    updateProgress();

    document.addEventListener('change', (e) => {
      if (e.target.matches('input[type="radio"]')) {
        updateProgress();
      }
    });

    document.getElementById('scoreBtn').addEventListener('click', scoreTest);
    document.getElementById('saveBtn').addEventListener('click', saveAnswers);
    document.getElementById('resetBtn').addEventListener('click', resetAnswers);
  </script>
</body>
</html>
